name: Deploy to webspace

on:
  push:
   branches: main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    
    - name: Setup sshpass
      run: sudo apt update && sudo apt install sshpass
    - run: sshpass -V
    
    - name: Add known host
      env:
        SSHPASS: ${{ secrets.SFTP_PASS }}
        SFTP_HOST: ${{ secrets.SFTP_HOST }}
        SSH_SERVER: ${{ secrets.SSH_SERVER }}
      # Single key type = single connection; Strato temp-blocks IPs that
      # open several unauthenticated connections in a row.
      run: mkdir ~/.ssh && ssh-keyscan -H -t ed25519 "$SSH_SERVER" >> ~/.ssh/known_hosts
      
    - name: Checkout repo
      uses: actions/checkout@v3
    
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 22

    - name: Install node modules
      run: npm ci

    - name: Build Astro static output
      run: npm run build

    - name: Deploy put sftp
      env:
        SFTP_HOST: ${{ secrets.SFTP_HOST }}
        SSHPASS: ${{ secrets.SFTP_PASS }}
        SSH_SERVER: ${{ secrets.SSH_SERVER}}
      # Retry with waits: Strato blocks the IP for a few minutes after the
      # keyscan connections above, and the Astro build is too fast to outlast it.
      run: |
        cd $GITHUB_WORKSPACE/dist
        for attempt in 1 2 3 4; do
          sshpass -e sftp "$SFTP_USER@$SSH_SERVER" <<< $"put -r . ./" && exit 0
          echo "sftp attempt $attempt failed, waiting 90s before retry"
          sleep 90
        done
        exit 1
